# /etc/nginx/conf.d/chronicleexhibits.conf

# 1) Redirect all HTTP requests (www and non-www) to HTTPS non-www
server {
    listen       80;
    listen       [::]:80;
    server_name  www.chronicleexhibits.com chronicleexhibits.com;

    # Permanent redirect to non-www HTTPS
    return 301 https://chronicleexhibits.com$request_uri;
}

# 2) Redirect HTTPS www → HTTPS non-www
server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  www.chronicleexhibits.com;

    ssl_certificate     /etc/letsencrypt/live/chronicleexhibits.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chronicleexhibits.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...';
    ssl_prefer_server_ciphers off;

    return 301 https://chronicleexhibits.com$request_uri;
}

# 3) Serve HTTPS non-www (Next.js app)
server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  chronicleexhibits.com;

    ssl_certificate     /etc/letsencrypt/live/chronicleexhibits.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chronicleexhibits.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...';
    ssl_prefer_server_ciphers off;

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root      /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Proxy API routes to Next.js
    location /api/ {
        proxy_pass         http://localhost:10001;
        proxy_http_version 1.1;
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;
        proxy_set_header   Upgrade              $http_upgrade;
        proxy_set_header   Connection           'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Next.js static assets
    location /_next/static/ {
        proxy_pass          http://localhost:10001;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    Upgrade          $http_upgrade;
        proxy_set_header    Connection       'upgrade';
        proxy_cache_bypass  $http_upgrade;

        expires             30d;
        add_header          Cache-Control "public, max-age=2592000";
        access_log          off;
    }

    # All other requests → Next.js pages
    location / {
        proxy_pass         http://localhost:10001;
        proxy_http_version 1.1;
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;
        proxy_set_header   Upgrade              $http_upgrade;
        proxy_set_header   Connection           'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}