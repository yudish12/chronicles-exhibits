# /etc/nginx/conf.d/chronicleexhibits.eu.conf

# 1) Redirect all HTTP requests (www and non-www) to HTTPS non-www
server {
    listen       80;
    listen       [::]:80;
    server_name  www.chronicleexhibits.eu chronicleexhibits.eu;

    location ^~ /.well-known/acme-challenge/ {
        root      /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://chronicleexhibits.eu$request_uri;
}

# 2) Redirect HTTPS www → HTTPS non-www
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    http2 on;
    server_name  www.chronicleexhibits.eu;

    ssl_certificate     /etc/letsencrypt/live/chronicleexhibits.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chronicleexhibits.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    return 301 https://chronicleexhibits.eu$request_uri;
}

# 3) Serve HTTPS non-www (Next.js app on port 3009 + Admin panel static files)
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    http2 on;
    server_name  chronicleexhibits.eu;

    ssl_certificate     /etc/letsencrypt/live/chronicleexhibits.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chronicleexhibits.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    location ^~ /.well-known/acme-challenge/ {
        root      /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Admin Panel Static Files
    location /admin/ {
        alias /home/chronicleeurope/public_html/chronicles-europe-admin/dist/;
        try_files $uri $uri/ /admin/index.html;

        # Disable caching for HTML
        location ~ \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # JS/CSS now 30 seconds
        location ~* \.(js|css)$ {
            expires 30s;
            add_header Cache-Control "public, must-revalidate";
        }

        # images/fonts now 5 minutes
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }
    }

    # Proxy API routes
    location /api/ {
        proxy_pass         http://localhost:3009;
        proxy_http_version 1.1;
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;
        proxy_set_header   Upgrade              $http_upgrade;
        proxy_set_header   Connection           'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static build assets — 10 minutes
    location /_next/static/ {
        proxy_pass          http://localhost:3009;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    Upgrade          $http_upgrade;
        proxy_set_header    Connection       'upgrade';
        proxy_cache_bypass  $http_upgrade;

        expires             10m;
        add_header          Cache-Control "public, must-revalidate";
        access_log          off;
    }

    # Other Next.js assets
    location /_next/ {
        proxy_pass          http://localhost:3009;
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    Upgrade          $http_upgrade;
        proxy_set_header    Connection       'upgrade';
        proxy_cache_bypass  $http_upgrade;
    }

    # All other → Next.js app
    location / {
        proxy_pass         http://localhost:3009;
        proxy_http_version 1.1;
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;
        proxy_set_header   Upgrade              $http_upgrade;
        proxy_set_header   Connection           'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}